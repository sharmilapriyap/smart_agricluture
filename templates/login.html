<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ t.login }}</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: linear-gradient(135deg, #eef4ea, #f9ecde);
            font-family: Georgia, "Segoe UI", sans-serif;
            color: #223127;
        }

        .card {
            width: min(420px, calc(100% - 32px));
            background: rgba(255, 252, 246, 0.96);
            padding: 28px;
            border-radius: 24px;
            box-shadow: 0 18px 40px rgba(44, 63, 46, 0.12);
        }

        h2 {
            margin-top: 0;
        }

        input,
        button {
            width: 100%;
            padding: 12px 14px;
            border-radius: 14px;
            font-size: 1rem;
            font-family: inherit;
        }

        input {
            border: 1px solid #d7c9b2;
            margin-bottom: 14px;
        }

        button {
            border: none;
            background: #2d6a4f;
            color: white;
            font-weight: 700;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <form class="card" action="/send_otp" method="post">
        <h2>{{ t.login }}</h2>
        <input type="text" name="mobile" placeholder="{{ t.enter_mobile }}" required>
        <button type="submit">{{ t.send_otp }}</button>
    </form>
</body>
</html>
